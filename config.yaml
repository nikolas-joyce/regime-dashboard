# Regime Dashboard — configuration
# All parameters here were empirically validated in Phase 0 (see research/regime-dashboard-plan.md
# section 7b for the full validation history — label-continuity fix, freeze-bug fix, vol-conditional
# separation redesign, cross-sectional confirmation, and two rejected refinements: direction-
# conditional vol thresholds and curve-gating). Do not hand-tune these without re-running the
# step0/step0b notebooks — several plausible-looking tweaks were tested and empirically failed.

data:
  start_date: "2005-01-01"
  underlyings_index: ["SPY", "QQQ", "IWM"]
  # Cross-sectionally validated basket. Original 20 (step0b, 2026-07-21): AAPL-WMT below.
  # Expansion 30 (step0c, 2026-07-21): confirmed consistent, not contradictory -- bear_lo
  # occurs in 29/30 names (stronger than step0b's 18/20), bull_hi-vs-bear_hi reversal
  # negative in 22/29 measurable names (76%, median -0.37sd, vs SPY's -1.08sd). PEP shows
  # no bear_lo occurrences in-sample; CRM shows no bull_lo occurrences in-sample -- both
  # noted, neither blocks inclusion (diagnostic, not a hard per-name gate). Full 50-name
  # universe per plan section 1.
  underlyings_names:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - JPM
    - BAC
    - XOM
    - CVX
    - UNH
    - JNJ
    - V
    - MA
    - PG
    - KO
    - HD
    - DIS
    - CSCO
    - WMT
    - WFC
    - GS
    - MS
    - C
    - SCHW
    - LLY
    - ABBV
    - MRK
    - PFE
    - TMO
    - CAT
    - HON
    - RTX
    - BA
    - NKE
    - MCD
    - SBUX
    - LOW
    - TGT
    - PEP
    - COST
    - ADBE
    - CRM
    - AVGO
    - QCOM
    - NFLX
    - AMD
    - COP
    - VZ
    - LIN
  vix_tickers: ["^VIX", "^VIX3M", "^VIX9D"]
  fred_series:
    hy_oas: "BAMLH0A0HYM2"
  stooq_failover: true

direction_engine:
  n_states: 3
  refit_every: 63          # trading days between HMM refits
  min_train: 756           # min obs before first fit (3y)
  # v3 fix: z-score separation gate is DIAGNOSTIC ONLY, does not block refit acceptance.
  # v2 (hard gate at 1.5) froze the model on its first pre-GFC fit -- worse than the bug it
  # replaced. Continuity matching (nearest-previous-mean assignment) is what actually prevents
  # label swaps; see pipeline/model.py fit_hmm().
  sep_z_thresh: 0.0
  random_state: 7
  min_covar: 1.0e-6

drift_model:
  # Curve slope is VX1-VX3 from vix-utils, (VX3-VX1)/VX1, z-scored -- NOT spot VIX3M/VIX ratios.
  # This is Nikolas's researched dataset; spot ratios are robustness comparators only.
  slope_source: "vix1_vix3_futures"
  forward_horizon_days: 5
  bullish_threshold: 0.65
  bearish_threshold: 0.35

vol_layer:
  # Reverted from v5's direction-conditional percentiles (tested live: didn't shrink the
  # bull_hi/bear_hi effect, cost backtest Sharpe 2.93->2.64). Back to unconditional percentiles.
  weights:
    vix_pct: 1.2
    backwardation: 1.0
    rv_pct: 1.0
    bias: -1.6
  logistic_scale: 4
  vix_pct_window: 252
  rv_window: 20
  rv_pct_window: 252

smoothing:
  commit_p: 0.70
  commit_days: 2
  min_dwell: 3

# Per-name tilt layer (plan section 3.5, "deliberately simple" -- no per-name HMMs).
# Confidence tiering for name-level structure recommendations reuses the MARKET layer's
# posterior, not a name-specific one -- the tilt layer itself is z-score-based, not
# Bayesian, and the plan doesn't specify a separate name-level confidence measure. This
# is a design assumption, not a validated choice -- flagged as an open item below.
tilt_layer:
  rs_window_short: 21
  rs_window_long: 63
  rs_z_window: 252
  rs_bull_thresh: 0.5
  rs_bear_thresh: -0.5
  name_vol_pct_window: 252
  name_vol_pct_thresh: 0.60

# Nightly IV/ATM-vol snapshot (plan section 5 step 3). Accumulates data/iv_snapshots.parquet
# toward the Phase 4 swap (realized-vol proxy -> real IV rank, once >=6 months of history
# exists) -- NOT wired into vol_state yet, this just starts collecting the data.
iv_snapshot:
  near_dte_target: 17       # near-term expiry for the IV term-slope leg
  far_dte_range: [30, 45]   # target expiry range, per plan section 5 step 3
  retries: 2
  throttle_sec: 0.35        # sleep between names -- avoid rate-limiting a 50-name chain-fetch loop

forecast:
  curve_k_grid: [0.0, 0.15, 0.30, 0.60]   # tilt sensitivity grid tested in step0 TEST 4
  # NOTE: step0's TEST 4 found curve-conditioning adds value (curve_conditioning_adds=true,
  # reproduced across every live run) -- unlike curve-GATING (TEST 1d/5b), which was tested
  # and rejected for the structure matrix. These are different mechanisms; don't conflate them.

backtest:
  trade_dte: 21
  trade_step: 5
  risk_free: 0.03

# Regime x structure matrix. bear_hi's call-ratio-backspread alternative was tested (TEST 5c,
# n=12 paired trades) and REJECTED -- underperformed the original on every metric (mean, hit
# rate, worst case, AND best case). Do not swap this out without a much larger validated sample.
structure_matrix:
  bull_hi:
    high_confidence: {structure: "short_put", legs: [{cp: put, delta: -0.30, pos: -1}]}
    moderate_confidence: {structure: "bull_put_credit_spread", legs: [{cp: put, delta: -0.30, pos: -1}, {cp: put, delta: -0.15, pos: 1}]}
    low_confidence: {structure: "no_trade", legs: []}
  bull_lo:
    high_confidence: {structure: "bull_call_debit_spread", legs: [{cp: call, delta: 0.55, pos: 1}, {cp: call, delta: 0.30, pos: -1}]}
    moderate_confidence: {structure: "bull_call_debit_spread_smaller", legs: [{cp: call, delta: 0.55, pos: 1}, {cp: call, delta: 0.30, pos: -1}]}
    low_confidence: {structure: "no_trade", legs: []}
  bear_hi:
    high_confidence: {structure: "bear_call_credit_spread", legs: [{cp: call, delta: 0.30, pos: -1}, {cp: call, delta: 0.15, pos: 1}]}
    moderate_confidence: {structure: "bear_call_credit_spread_smaller", legs: [{cp: call, delta: 0.30, pos: -1}, {cp: call, delta: 0.15, pos: 1}]}
    low_confidence: {structure: "no_trade", legs: []}
  bear_lo:
    high_confidence: {structure: "bear_put_debit_spread", legs: [{cp: put, delta: -0.55, pos: 1}, {cp: put, delta: -0.30, pos: -1}]}
    moderate_confidence: {structure: "bear_put_debit_spread_smaller", legs: [{cp: put, delta: -0.55, pos: 1}, {cp: put, delta: -0.30, pos: -1}]}
    low_confidence: {structure: "no_trade", legs: []}
  neut_hi:
    high_confidence: {structure: "wide_bull_put_credit_spread", legs: [{cp: put, delta: -0.20, pos: -1}, {cp: put, delta: -0.10, pos: 1}]}
    moderate_confidence: {structure: "no_trade", legs: []}
    low_confidence: {structure: "no_trade", legs: []}
  neut_lo:
    high_confidence: {structure: "no_trade", legs: []}
    moderate_confidence: {structure: "no_trade", legs: []}
    low_confidence: {structure: "no_trade", legs: []}

# RESOLVED 2026-07-22 (Nikolas: "go with your instincts on the 4 questions and let's
# proceed" -- judgment calls below, reversible if he disagrees on review):
#   (a) bull_hi short_put stays high-confidence ONLY, not extended to moderate at half
#       size. bull_hi is a high-vol regime -- exactly where undefined-risk convexity
#       hurts most if the read is wrong. Matrix already tiers risk down via _smaller
#       variants elsewhere; widening naked exposure into a high-vol cell's moderate tier
#       cuts against that pattern rather than following it.
#   (b) neut_hi's bull-put bias is INTENTIONAL, kept asymmetric. "neut" = no strong
#       directional edge detected by the HMM, not literal 50/50 -- equities carry
#       positive unconditional drift + a persistent vol risk premium, so skewing premium
#       sale toward puts in a neutral-but-elevated-vol regime is standard practice, not
#       an oversight. A true iron condor is the more-neutral alternative but was never
#       validated in Phase 0 -- not substituting it in without evidence.
#   (c) delta targets vs. putspread v3: false conflict, nothing to reconcile. v3 is
#       0DTE and strike-selected by otm_pct (1% OTM); this dashboard is 21-45 DTE and
#       delta-targeted. Different tenor, different correct risk unit -- no convention to
#       import. Current deltas (-0.30/-0.15 credit legs, 0.55/0.30 debit legs) stand.
#   (d) per-name confidence reusing the market posterior is CONFIRMED, not name-specific.
#       Matches the plan's explicit "deliberately simple, no per-name HMM" design choice.
#       A real per-name Bayesian confidence measure is an unvalidated scope expansion,
#       not something to bolt on unilaterally.
# No structure_matrix values changed as a result -- this block documents the resolution,
# not a recalibration.

confidence_bands:
  high: 0.75
  moderate: 0.55

default_dte: [30, 45]
