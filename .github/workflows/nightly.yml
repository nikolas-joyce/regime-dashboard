name: nightly-regime-update

on:
  schedule:
    - cron: "30 22 * * 1-5"   # ~22:30 UTC weekdays, per plan section 5
  workflow_dispatch: {}        # allow manual trigger for testing

jobs:
  update:
    runs-on: [self-hosted, windows]
    # Changed from ubuntu-latest 2026-07-22: CBOE's CDN returns 403 to GitHub-hosted
    # runner IPs for VX futures settlement CSVs (confirmed via a direct reachability
    # probe in pull_vx_curve -- see git history). Running on Nikolas's own Windows PC
    # sidesteps the IP block, mirroring the yfinance-blocking workaround already in
    # place for price pulls. Caveat: this PC must be on and awake at ~22:30 UTC on
    # weekdays for the cron trigger to fire -- check Settings > System > Power & sleep,
    # or set a Task Scheduler wake timer, if it's been going to sleep.
    steps:
      - uses: actions/checkout@v4

      - name: Check Python (dedicated venv, not PATH-resolved)
        # 2026-07-22: this machine has no general-purpose system Python -- `python` on
        # PATH resolved to a different tool's (hermes-agent) isolated venv, and the only
        # other PATH match was the Microsoft Store app-execution-alias stub (unreliable
        # for automation). Rather than depend on PATH resolution or a service account's
        # environment at all, this pipeline gets its own dedicated venv at
        # C:\actions-runner\regime-dashboard-venv (bootstrapped once from hermes-agent's
        # interpreter, but fully independent -- no shared site-packages), referenced here
        # by full path.
        run: C:\actions-runner\regime-dashboard-venv\Scripts\python.exe --version

      - name: Install dependencies
        run: C:\actions-runner\regime-dashboard-venv\Scripts\pip.exe install -r requirements.txt

      - name: Run nightly pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: C:\actions-runner\regime-dashboard-venv\Scripts\python.exe -m pipeline.run_nightly

      - name: Commit outputs
        # Rewritten in plain PowerShell (2026-07-22): the original bash `||` one-liner
        # needed a working bash. `shell: bash` resolved to Windows' WSL stub (no distro
        # installed -> failure); pointing at Git Bash's full path
        # ('C:\Program Files\Git\bin\bash.exe -e {0}') hit a separate runner bug --
        # the space in "Program Files" breaks the runner's parsing of a custom shell
        # command line ("Second path fragment must not be a drive or UNC name"). Avoiding
        # bash entirely sidesteps both problems -- no `shell:` override needed, this runs
        # fine under whatever PowerShell version is default on a Windows runner.
        run: |
          git config user.name "regime-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ output/
          git diff --quiet --cached
          if ($LASTEXITCODE -ne 0) {
            $today = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
            git commit -m "nightly regime update $today"
          }
          git push
